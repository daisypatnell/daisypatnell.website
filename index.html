<!DOCTYPE html>
<html>

<head>
<title>Daisy Patnell</title>

<style>

body {
    margin: 0;
    overflow: hidden;
}

.background {
    position: fixed;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
}

.icon {
    position: absolute;
}

/* Optional: make icons slightly smaller on phones */
@media (max-width: 768px) {
    .icon {
        transform: scale(0.8);
        transform-origin: top left;
    }
}

</style>

</head>

<body>

<!-- Background -->

<img src="background.jpg" class="background">

<!-- Clickable Vimeo Video --> 

<iframe
    class="icon"
    style="top:20%; left:15%; width:25%; height:25%;"
    src="https://player.vimeo.com/video/1190585552"
    frameborder="0"
    allow="autoplay; fullscreen; picture-in-picture"
    allowfullscreen>
</iframe>

<!-- Clickable Portfolio Image -->

<a href="films.html">
    <img src="film.png"
         class="icon"
         style="top:55%; left:65%; width:15%;">
</a>

<!-- Video -->

<video controls
       class="icon"
       style="top:25%; left:45%; width:25%;">
    <source src="trailer.mp4">
</video>

</body>

</html>
